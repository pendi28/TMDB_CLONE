kind = "web"
previewPath = "/"
title = "XpoGo Streaming"
version = "1.0.0"
id = "artifacts/xpogo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21778

[services.development]
run = "pnpm --filter @workspace/xpogo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/xpogo", "run", "build" ]
publicDir = "artifacts/xpogo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21778"
BASE_PATH = "/"
