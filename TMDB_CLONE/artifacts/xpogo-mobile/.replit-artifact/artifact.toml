kind = "mobile"
previewPath = "/mobile/"
title = "XpoGo Mobile"
version = "1.0.0"
id = "artifacts/xpogo-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 26263

[services.development]
run = "pnpm --filter @workspace/xpogo-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/xpogo-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/xpogo-mobile", "run", "serve" ]

[services.env]
PORT = "26263"
BASE_PATH = "/mobile/"
